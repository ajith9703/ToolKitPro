<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="description"
        content="Generate strong, random passwords with custom length and character sets. Free online password generator." />
    <title>Password Generator – ToolKit Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <style>
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }

        .checkbox-item:hover {
            border-color: var(--primary);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: .9rem;
            font-weight: 500;
        }

        .password-output {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--bg-2);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            word-break: break-all;
            letter-spacing: .05em;
            text-align: center;
            margin: 20px 0;
            color: var(--primary);
        }

        .strength-label {
            font-size: .82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-top: 6px;
            display: block;
        }

        .strength-weak {
            color: #f43f5e;
        }

        .strength-fair {
            color: #f59e0b;
        }

        .strength-good {
            color: #10b981;
        }

        .strength-strong {
            color: #06b6d4;
        }

        .len-display {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--primary);
            margin-left: 8px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            height: 6px;
            cursor: pointer;
        }
    </style>
    <script src="https://pl28858032.effectivegatecpm.com/a0/e2/ac/a0e2ac0c91ec8d62fd161ee7095bbb0a.js"></script>
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"><span class="logo-icon">⚡</span><span class="logo-text">ToolKit <span
                        class="accent">Pro</span></span></a>
            <div class="nav-center">
                <div class="search-bar" id="search-bar"><span class="search-icon">🔍</span><input type="text"
                        id="search-input" placeholder="Search tools..." autocomplete="off" />
                    <div class="search-results" id="search-results"></div>
                </div>
            </div>
            <div class="nav-right"><button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"><span
                        class="theme-icon">🌙</span></button><button class="nav-mobile-toggle"
                    id="mobile-menu-btn">☰</button></div>
        </div>
    </nav>

    <div class="tool-page-wrap">
        <a href="../index.html" class="back-link">← Back to All Tools</a>
        <div class="tool-page-hero">
            <div class="tool-page-icon">🔐</div>
            <h1 class="tool-page-title gradient-text">Password Generator</h1>
            <p class="tool-page-sub">Create strong, random and unique passwords with customizable length and character
                options.</p>
        </div>
        <div class="tool-page-body">
            <div class="tool-box">
                <div class="form-group">
                    <label class="form-label">Password Length: <span class="len-display"
                            id="len-display">16</span></label>
                    <input type="range" id="length-slider" min="6" max="64" value="16" oninput="onLenChange(this.value)"
                        style="margin-top:8px;" />
                </div>

                <div class="form-group">
                    <label class="form-label">Include Characters</label>
                    <div class="checkbox-grid">
                        <div class="checkbox-item"><input type="checkbox" id="ck-upper" checked /><label
                                for="ck-upper">Uppercase (A–Z)</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="ck-lower" checked /><label
                                for="ck-lower">Lowercase (a–z)</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="ck-nums" checked /><label
                                for="ck-nums">Numbers (0–9)</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="ck-syms" checked /><label
                                for="ck-syms">Symbols (!@#...)</label></div>
                    </div>
                </div>

                <div class="password-output" id="password-output">Click Generate</div>

                <div class="strength-bar">
                    <div class="strength-fill" id="strength-fill" style="width:0%"></div>
                </div>
                <span class="strength-label" id="strength-label">—</span>

                <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;">
                    <button class="btn btn-primary btn-glow" onclick="openSmartlink(event, 'generatePassword()')"
                        style="flex:1;justify-content:center;">🎲 Generate</button>
                    <button class="copy-btn" id="copy-pass-btn" onclick="openSmartlink(event, 'copyPass()')" style="padding:14px 20px;">📋
                        Copy</button>
                </div>

                <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px;" id="bulk-section">
                    <button onclick="openSmartlink(event, 'generateBulk()')"
                        style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:.82rem;text-decoration:underline;text-align:left;padding:0;">Generate
                        5 passwords at once</button>
                    <div id="bulk-list" style="display:flex;flex-direction:column;gap:8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="../script.js"></script>
    <script>
        const CHARS = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            nums: '0123456789',
            syms: '!@#$%^&*()-_=+[]{}|;:,.<>?'
        };

        function getCharset() {
            let s = '';
            if (document.getElementById('ck-upper').checked) s += CHARS.upper;
            if (document.getElementById('ck-lower').checked) s += CHARS.lower;
            if (document.getElementById('ck-nums').checked) s += CHARS.nums;
            if (document.getElementById('ck-syms').checked) s += CHARS.syms;
            return s;
        }

        function randomPassword(len) {
            const charset = getCharset();
            if (!charset) return '';
            const arr = new Uint32Array(len);
            crypto.getRandomValues(arr);
            return Array.from(arr, n => charset[n % charset.length]).join('');
        }

        function calcStrength(pwd) {
            let score = 0;
            if (pwd.length >= 8) score++;
            if (pwd.length >= 12) score++;
            if (pwd.length >= 16) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[a-z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            return score;
        }

        function generatePassword() {
            const len = parseInt(document.getElementById('length-slider').value);
            const charset = getCharset();
            if (!charset) { showToast('Select at least one character type.', 'error'); return; }
            const pwd = randomPassword(len);
            document.getElementById('password-output').textContent = pwd;
            updateStrength(pwd);
            document.getElementById('bulk-list').innerHTML = '';
        }

        function updateStrength(pwd) {
            const score = calcStrength(pwd);
            const pct = Math.min((score / 7) * 100, 100);
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            fill.style.width = pct + '%';
            if (score <= 2) { fill.style.background = '#f43f5e'; label.textContent = 'Weak'; label.className = 'strength-label strength-weak'; }
            else if (score <= 4) { fill.style.background = '#f59e0b'; label.textContent = 'Fair'; label.className = 'strength-label strength-fair'; }
            else if (score <= 5) { fill.style.background = '#10b981'; label.textContent = 'Good'; label.className = 'strength-label strength-good'; }
            else { fill.style.background = '#06b6d4'; label.textContent = 'Strong'; label.className = 'strength-label strength-strong'; }
        }

        function onLenChange(val) {
            document.getElementById('len-display').textContent = val;
            generatePassword();
        }

        function copyPass() {
            const pwd = document.getElementById('password-output').textContent;
            if (!pwd || pwd === 'Click Generate') { showToast('Generate a password first!', 'error'); return; }
            copyToClipboard(pwd, document.getElementById('copy-pass-btn'));
        }

        function generateBulk() {
            const len = parseInt(document.getElementById('length-slider').value);
            const charset = getCharset();
            if (!charset) { showToast('Select at least one character type.', 'error'); return; }
            const list = document.getElementById('bulk-list');
            list.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const pwd = randomPassword(len);
                const row = document.createElement('div');
                row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-sm);';
                row.innerHTML = `<span style="flex:1;font-family:monospace;font-size:.85rem;word-break:break-all;">${pwd}</span>
      <button class="copy-btn" onclick="openSmartlink(event, 'copyToClipboard(\'${pwd}\',this)')" style="flex-shrink:0;">📋</button>`;
                list.appendChild(row);
            }
        }

        // Generate on load
        generatePassword();
    </script>
</body>

</html>
